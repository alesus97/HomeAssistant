##########################################     Sonoff Tasmota     ##########################################

  - platform: mqtt
    name: "Luce Camera Alessio"
    state_topic: "stat/sonoffMini/LuceCameraAlessio/RESULT"  
    value_template: "{{ value_json.POWER }}"
    command_topic: "cmnd/sonoffMini/LuceCameraAlessio/POWER"
    payload_on: "ON"
    payload_off: "OFF"
    availability_topic: "tele/sonoffMini/LuceCameraAlessio/LWT"
    payload_available: "Online"
    payload_not_available: "Offline"
    qos: 1
    retain: false
    
